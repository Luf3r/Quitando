name: CI

on:
  pull_request:
  push:
    branches: [ main, develop ]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/quitando_development
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/quitando_test

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev libvips-dev

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run the canonical CI contract
        run: bin/ci

  production-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Verify the production image
        run: bin/verify-production-image
